name: Obsidian Brand Gate CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'sdk/obsidian-brand-gate/package-lock.json'

    - name: Install Dependencies
      run: npm ci
      working-directory: sdk/obsidian-brand-gate

    - name: Build TypeScript
      run: npm run build
      working-directory: sdk/obsidian-brand-gate

    - name: Run Verification Tests
      run: chmod +x tests/run_all.sh && ./tests/run_all.sh
      working-directory: sdk/obsidian-brand-gate
